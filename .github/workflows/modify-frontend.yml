name: Modify Frontend to Output pppp

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  modify-frontend:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 需要写入权限来提交更改
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Find and modify frontend files
        run: |
          # 查找常见的网页文件并修改它们的内容为输出 "pppp"
          
          # 处理 index.html
          if [ -f "index.html" ]; then
            echo '<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>pppp</title>
          </head>
          <body>
              pppp
          </body>
          </html>' > index.html
            echo "Modified index.html"
          fi
          
          # 查找并修改其他可能的入口文件
          for file in $(find . -maxdepth 2 -type f \( -name "*.html" -o -name "*.htm" \) ! -path "./node_modules/*" ! -path "./.git/*"); do
            if [ "$file" != "./index.html" ]; then
              echo '<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>pppp</title>
          </head>
          <body>
              pppp
          </body>
          </html>' > "$file"
              echo "Modified $file"
            fi
          done
          
          # 如果存在 React/Vue 等框架的主文件
          find . -type f \( -name "App.js" -o -name "App.jsx" -o -name "App.tsx" -o -name "main.js" -o -name "main.tsx" -o -name "index.js" \) ! -path "./node_modules/*" ! -path "./.git/*" -exec sh -c '
            for file do
              echo "// Modified to output pppp
          document.body.innerHTML = \"pppp\";
          document.title = \"pppp\";" > "$file"
              echo "Modified $file"
            done
          ' sh {} +
          
          # 修改 CSS 文件添加 pppp 显示
          find . -type f -name "*.css" ! -path "./node_modules/*" ! -path "./.git/*" -exec sh -c '
            for file do
              echo "/* Modified to show pppp */
          body::before {
              content: \"pppp\";
              display: block;
              font-size: 24px;
              text-align: center;
              padding: 20px;
          }" >> "$file"
              echo "Modified CSS: $file"
            done
          ' sh {} +
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Modify frontend to output pppp"
            git push
          fi
