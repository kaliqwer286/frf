name: 修改前端代码验证

on:
  # 手动触发，避免意外执行
  workflow_dispatch:
  
  # 也可以设置为 push 时自动触发（测试用）
  # push:
  #   branches: [ main ]

# 设置写入权限
permissions:
  contents: write

jobs:
  modify-frontend:
    runs-on: ubuntu-latest
    
    steps:
      # 第一步：检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 确保有写入权限
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 第二步：创建或修改前端文件（如果不存在）
      - name: 创建 HTML 文件
        run: |
          # 如果 docs 目录不存在就创建
          mkdir -p docs
          
          # 写入内容为 "pppp" 的 HTML 文件
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>验证页面</title>
              <style>
                  body {
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      font-size: 48px;
                      font-family: monospace;
                  }
              </style>
          </head>
          <body>
              pppp
          </body>
          </html>
          EOF
          
          echo "✅ 已创建 docs/index.html，内容包含 'pppp'"
      
      # 第三步：修改 README.md（如果存在）
      - name: 修改 README
        run: |
          echo "# 测试仓库" > README.md
          echo "" >> README.md
          echo "## 页面内容" >> README.md
          echo "当前 GitHub Pages 首页显示：**pppp**" >> README.md
          echo "" >> README.md
          echo "✅ 此文件由 GitHub Actions 工作流自动修改" >> README.md
          
          echo "✅ 已更新 README.md"
      
      # 第四步：提交并推送更改
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有更改
          git add docs/ README.md
          
          # 检查是否有更改需要提交
          if git diff --staged --quiet; then
            echo "ℹ️ 没有检测到更改，跳过提交"
          else
            git commit -m "🤖 工作流自动更新：设置页面显示 pppp"
            git push
            echo "✅ 已成功推送更改到仓库"
          fi
      
      # 第五步：输出访问链接
      - name: 输出页面链接
        run: |
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          USER_NAME=$(echo ${{ github.repository }} | cut -d'/' -f1)
          echo "=========================================="
          echo "✅ 工作流执行完成！"
          echo "📁 文件位置：docs/index.html"
          echo "🔗 GitHub Pages 访问地址："
          echo "   https://${USER_NAME}.github.io/${REPO_NAME}/"
          echo "=========================================="
          echo ""
          echo "⚠️  注意：GitHub Pages 可能需要 1-2 分钟才能生效"
